<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel HP - Spin Control</title>
    <style>
        body { background: #1e293b; color: white; font-family: sans-serif; padding: 20px; }
        .btn-spin { width: 100%; padding: 20px; background: #2563eb; border: none; border-radius: 15px; color: white; font-weight: bold; font-size: 18px; margin-bottom: 20px; }
        .prize-option { background: #334155; padding: 15px; margin-bottom: 10px; border-radius: 10px; display: flex; justify-content: space-between; border: 2px solid transparent; }
        .prize-option.selected { border-color: #fbbf24; background: #475569; }
        .status { text-align: center; font-size: 12px; margin-bottom: 10px; color: #94a3b8; }
    </style>
</head>
<body>
    <div class="status" id="status">Menghubungkan ke Laptop...</div>
    <button class="btn-spin" id="btnSpin">PUTAR RODA DI LAPTOP</button>
    
    <div id="prizeList"></div>

    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <script>
        const peer = new Peer();
        let connection = null;
        const prizes = ["ZONK", "1.000", "5.000", "10.000", "15.000", "20.000", "50.000"];

        peer.on('open', () => {
            connection = peer.connect('roda-keberuntungan-2026');
            connection.on('open', () => {
                document.getElementById('status').innerText = "✅ TERHUBUNG KE LAPTOP";
            });
        });

        const prizeList = document.getElementById('prizeList');
        prizes.forEach((label, index) => {
            const div = document.createElement('div');
            div.className = 'prize-option';
            div.innerHTML = `<span>${label}</span>`;
            div.onclick = () => {
                document.querySelectorAll('.prize-option').forEach(el => el.classList.remove('selected'));
                div.classList.add('selected');
                connection.send({ type: 'SET_WINNER', index: index });
            };
            prizeList.appendChild(div);
        });

        document.getElementById('btnSpin').onclick = () => {
            if (connection) connection.send({ type: 'SPIN' });
        };
    </script>
</body>
</html>
