<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spin Wheel - Display Laptop</title>
    <style>
        body { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; background-color: #0f172a; color: white; font-family: sans-serif; overflow: hidden; }
        .wheel-container { position: relative; width: 450px; height: 450px; }
        #wheel { width: 100%; height: 100%; border-radius: 50%; border: 8px solid #334155; transition: transform 5s cubic-bezier(0.15, 0, 0.15, 1); background-color: #fff; }
        .pointer { position: absolute; top: -20px; left: 50%; transform: translateX(-50%); width: 0; height: 0; border-left: 20px solid transparent; border-right: 20px solid transparent; border-top: 40px solid #fbbf24; z-index: 10; }
        #result { margin-top: 25px; font-size: 32px; font-weight: bold; min-height: 45px; color: #fbbf24; }
        .status-koneksi { position: fixed; bottom: 10px; font-size: 12px; color: #475569; }
    </style>
</head>
<body>
    <div class="wheel-container">
        <div class="pointer"></div>
        <canvas id="wheel" width="500" height="500"></canvas>
    </div>
    <div id="result">Menunggu Koneksi HP...</div>
    <div class="status-koneksi" id="peerIdDisplay">Menghubungkan ke server...</div>

    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <script>
        const canvas = document.getElementById('wheel');
        const ctx = canvas.getContext('2d');
        const resultText = document.getElementById('result');
        const peerIdDisplay = document.getElementById('peerIdDisplay');

        const prizes = [
            { id: 0, label: "ZONK", color: "#ef4444" },
            { id: 1, label: "1.000", color: "#10b981" },
            { id: 2, label: "5.000", color: "#f59e0b" },
            { id: 3, label: "10.000", color: "#8b5cf6" },
            { id: 4, label: "15.000", color: "#06b6d4" },
            { id: 5, label: "20.000", color: "#ec4899" },
            { id: 6, label: "50.000", color: "#3b82f6" }
        ];

        const sliceAngle = 360 / prizes.length;
        let currentRotation = 0;
        let forcedWinningIndex = null;

        // --- PEERJS LOGIC ---
        const peer = new Peer('roda-keberuntungan-2026'); // ID Tetap untuk Laptop

        peer.on('open', id => {
            peerIdDisplay.innerText = "Laptop Ready! ID: " + id;
            resultText.innerText = "Siap Digunakan";
        });

        peer.on('connection', conn => {
            resultText.innerText = "HP Terhubung!";
            conn.on('data', (data) => {
                if (data.type === 'SET_WINNER') {
                    forcedWinningIndex = data.index;
                } else if (data.type === 'SPIN') {
                    mulaiPutar();
                } else if (data.type === 'RESET') {
                    forcedWinningIndex = null;
                }
            });
        });

        function drawWheel() {
            const centerX = 250, centerY = 250, radius = 245;
            prizes.forEach((prize, i) => {
                const startAngle = (i * sliceAngle - 90) * Math.PI / 180;
                const endAngle = ((i + 1) * sliceAngle - 90) * Math.PI / 180;
                ctx.beginPath();
                ctx.fillStyle = prize.color;
                ctx.moveTo(centerX, centerY);
                ctx.arc(centerX, centerY, radius, startAngle, endAngle);
                ctx.fill();
                ctx.save();
                ctx.translate(centerX, centerY);
                ctx.rotate(startAngle + ((sliceAngle / 2) * Math.PI / 180));
                ctx.textAlign = "right"; ctx.fillStyle = "#fff"; ctx.font = "bold 24px Arial";
                ctx.fillText(prize.label, radius - 40, 10);
                ctx.restore();
            });
        }

        function mulaiPutar() {
            let winningIndex = (forcedWinningIndex !== null) ? forcedWinningIndex : (Math.random() * 100 < 90 ? 0 : 1);
            resultText.innerText = "Memutar...";
            const extraDegrees = (360 - (winningIndex * sliceAngle)) - (sliceAngle / 2);
            const totalRotation = 3600 + extraDegrees;
            currentRotation += totalRotation;
            canvas.style.transform = `rotate(${currentRotation}deg)`;
            setTimeout(() => {
                resultText.innerText = "HASIL: " + prizes[winningIndex].label;
                forcedWinningIndex = null; // Reset otomatis setelah putar
            }, 5000);
        }

        drawWheel();
    </script>
</body>
</html>
